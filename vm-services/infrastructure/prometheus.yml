global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'event-service'
    scrape_interval: 10s
    metrics_path: /metrics
    basic_auth:
      username: ${METRICS_USER:-prometheus}
      password: ${METRICS_PASS:-changeme}
    static_configs:
      - targets: ['localhost:3001']

  - job_name: 'livekit-server'
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:7880']
